{% extends "dashboard.html" %}

{% block content %}
<h2>Cargar archivo CSV</h2>

{% if mensaje %}
<p>{{ mensaje }}</p>
{% endif %}

<form method="post" enctype="multipart/form-data">
    <input type="file" name="csvFile" accept=".csv" required>
    <input type="submit" value="Subir CSV">
</form>
{% endblock %}
