<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Dashboard</h1>
    </header>

    <div class="container">
        <!-- Barra lateral -->
        <aside class="sidebar">
            <ul>
                <li><a href="{{ url_for('index') }}">Inicio</a></li>
                <li><a href="{{ url_for('cargar') }}">Cargar Datos</a></li>
                <li><a href="#">Análisis</a></li>
                <li><a href="#">Salir</a></li>
            </ul>
        </aside>

        <!-- Contenido principal -->
        <main class="content">
            {% block content %}
            {% endblock %}
        </main>
    </div>
</body>
</html>
